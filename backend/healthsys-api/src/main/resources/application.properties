spring.application.name=${SPRING_APPLICATION_NAME:healthsys-api}
healthsys.service.role=${HEALTHSYS_SERVICE_ROLE:all}

server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:postgresql://localhost:5432/healthsys
spring.datasource.username=postgres
spring.datasource.password=osenhorehmeupastor
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

healthsys.jwt.secret=${HEALTHSYS_JWT_SECRET:healthsys-secret-key-healthsys-secret-key-2026}
healthsys.jwt.expiration-ms=${HEALTHSYS_JWT_EXPIRATION_MS:86400000}
healthsys.kafka.enabled=${HEALTHSYS_KAFKA_ENABLED:false}
healthsys.kafka.publisher.enabled=${HEALTHSYS_KAFKA_PUBLISHER_ENABLED:${HEALTHSYS_KAFKA_ENABLED:false}}
healthsys.kafka.consumer.enabled=${HEALTHSYS_KAFKA_CONSUMER_ENABLED:${HEALTHSYS_KAFKA_ENABLED:false}}
healthsys.kafka.topics.triage-created=${HEALTHSYS_KAFKA_TRIAGE_TOPIC:triage.created}

spring.cache.type=${HEALTHSYS_CACHE_TYPE:simple}
spring.data.redis.host=${HEALTHSYS_REDIS_HOST:localhost}
spring.data.redis.port=${HEALTHSYS_REDIS_PORT:6379}
spring.kafka.bootstrap-servers=${HEALTHSYS_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${HEALTHSYS_KAFKA_GROUP_ID:healthsys-group}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.listener.missing-topics-fatal=false

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=${spring.application.name}
info.app.service-role=${healthsys.service.role}
