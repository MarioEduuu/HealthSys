apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      containers:
        - name: patient-service
          image: healthsys/patient-service:latest
          env:
            - name: SPRING_APPLICATION_NAME
              value: healthsys-patient-service
            - name: HEALTHSYS_SERVICE_ROLE
              value: patient
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
spec:
  selector:
    app: patient-service
  ports:
    - port: 8080
      targetPort: 8080
