apiVersion: apps/v1
kind: Deployment
metadata:
  name: triage-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: triage-service
  template:
    metadata:
      labels:
        app: triage-service
    spec:
      containers:
        - name: triage-service
          image: healthsys/triage-service:latest
          env:
            - name: SPRING_APPLICATION_NAME
              value: healthsys-triage-service
            - name: HEALTHSYS_SERVICE_ROLE
              value: triage
            - name: HEALTHSYS_KAFKA_ENABLED
              value: "true"
            - name: HEALTHSYS_KAFKA_PUBLISHER_ENABLED
              value: "true"
            - name: HEALTHSYS_KAFKA_CONSUMER_ENABLED
              value: "false"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: triage-service
spec:
  selector:
    app: triage-service
  ports:
    - port: 8080
      targetPort: 8080
