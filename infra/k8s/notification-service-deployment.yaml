apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: healthsys/notification-service:latest
          env:
            - name: SPRING_APPLICATION_NAME
              value: healthsys-notification-service
            - name: HEALTHSYS_SERVICE_ROLE
              value: notification
            - name: HEALTHSYS_KAFKA_ENABLED
              value: "true"
            - name: HEALTHSYS_KAFKA_PUBLISHER_ENABLED
              value: "false"
            - name: HEALTHSYS_KAFKA_CONSUMER_ENABLED
              value: "true"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - port: 8080
      targetPort: 8080
