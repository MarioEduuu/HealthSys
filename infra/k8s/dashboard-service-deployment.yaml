apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-service
  template:
    metadata:
      labels:
        app: dashboard-service
    spec:
      containers:
        - name: dashboard-service
          image: healthsys/dashboard-service:latest
          env:
            - name: SPRING_APPLICATION_NAME
              value: healthsys-dashboard-service
            - name: HEALTHSYS_SERVICE_ROLE
              value: dashboard
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
spec:
  selector:
    app: dashboard-service
  ports:
    - port: 8080
      targetPort: 8080
