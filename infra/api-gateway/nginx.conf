upstream frontend_service {
    server frontend:80;
}

upstream user_service {
    server user-service:8080;
}

upstream patient_service {
    server patient-service:8080;
}

upstream medical_record_service {
    server medical-record-service:8080;
}

upstream triage_service {
    server triage-service:8080;
}

upstream notification_service {
    server notification-service:8080;
}

upstream dashboard_service {
    server dashboard-service:8080;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 10m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;

    location = /api/auth/register {
        proxy_pass http://user_service;
    }

    location = /api/auth/login {
        proxy_pass http://user_service;
    }

    location /api/auth/ {
        proxy_pass http://user_service;
    }

    location /auth/ {
        proxy_pass http://user_service;
    }

    location = /api/users {
        proxy_pass http://user_service;
    }

    location /api/users/ {
        proxy_pass http://user_service;
    }

    location ~ ^/api/patients/[^/]+/vacinas {
        proxy_pass http://medical_record_service;
    }

    location = /api/patients {
        proxy_pass http://patient_service;
    }

    location /api/patients/ {
        proxy_pass http://patient_service;
    }

    location = /api/pacientes {
        proxy_pass http://patient_service;
    }

    location /api/pacientes/ {
        proxy_pass http://patient_service;
    }

    location = /patients {
        proxy_pass http://patient_service;
    }

    location /patients/ {
        proxy_pass http://patient_service;
    }

    location = /api/medical-records {
        proxy_pass http://medical_record_service;
    }

    location /api/medical-records/ {
        proxy_pass http://medical_record_service;
    }

    location = /api/triages {
        proxy_pass http://triage_service;
    }

    location /api/triages/ {
        proxy_pass http://triage_service;
    }

    location = /api/notifications {
        proxy_pass http://notification_service;
    }

    location /api/notifications/ {
        proxy_pass http://notification_service;
    }

    location /api/dashboard/ {
        proxy_pass http://dashboard_service;
    }

    location /actuator/ {
        proxy_pass http://dashboard_service;
    }

    location / {
        proxy_pass http://frontend_service;
    }
}
